<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Precision Agriculture Dashboard</title>

  <!-- ✅ React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- ✅ Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f7f2;
      padding: 20px;
    }
    h1 {
      color: #2e7d32;
    }
    .zone {
  background: #ffffff;
  padding: 18px;
  margin-bottom: 18px;
  border-radius: 8px;
  border-left: 6px solid #4caf50;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}
    .normal { border-left-color: green; }
    .monitor { border-left-color: orange; }
    .action { border-left-color: red; }
    .badge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 12px;
  color: white;
  font-size: 12px;
  margin-top: 5px;
}

.badge-normal {
  background-color: green;
}

.badge-monitor {
  background-color: orange;
}

.badge-action {
  background-color: red;
}
  </style>
</head>

<body>
  <h1>🌱 Precision Agriculture Dashboard</h1>
  <div id="root"></div>

  <script type="text/babel">
    function App() {
      const [zones, setZones] = React.useState([]);

      React.useEffect(() => {

  const fetchZones = () => {
    fetch("http://localhost:3001/api/zones/irrigation-status", {
  headers: {
    "Authorization": "Bearer " + localStorage.getItem("token")
  }
})
.then(res => {
  if (!res.ok) {
    throw new Error("Unauthorized or token missing");
  }
  return res.json();
})
.then(data => setZones(data))
.catch(err => console.error("Frontend fetch error:", err));

  };

  // Initial load
  fetchZones();

  // Auto refresh every 5 seconds
  const interval = setInterval(fetchZones, 5000);

  // Cleanup on page unload
  return () => clearInterval(interval);

}, []);

      return (
        <div>
          {zones.map(zone => {
            const statusClass =
              zone.irrigation.status === "Action Required"
                ? "action"
                : zone.irrigation.status === "Monitor"
                ? "monitor"
                : "normal";

            return (
              <div key={zone.zoneId} className={`zone ${statusClass}`}>
                <h3>{zone.zoneName}</h3>
                <p>Soil Moisture: {zone.sensorData.soilMoisture}%</p>
                <p>Temperature: {zone.sensorData.temperature}°C</p>
                <p>Humidity: {zone.sensorData.humidity}%</p>
                <div className={
  zone.irrigation.status === "Action Required"
    ? "badge badge-action"
    : zone.irrigation.status === "Monitor"
    ? "badge badge-monitor"
    : "badge badge-normal"
}>
  {zone.irrigation.status}
</div>
                <p>Score: {zone.irrigation.score}</p>
                <small>{zone.dataSource}</small>
              </div>
            );
          })}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
